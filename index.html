<!DOCTYPE html>
<html lang="en" class="h-100">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="css/site.css" rel="stylesheet">
    <title>Address Book</title>
</head>

<body class="h-100">

    <div class="container p-4">
        <div class="row fw-bold fs-4 ps-2">My Address Book</div>
        <form class="row bg-light p-3 shadow-lg border border-4">
            <div class="col-12 col-md-4">
                <div><img src="/img/GirlOne_4x.png" class="img-fluid" alt="Pic"></div>
            </div>
            <div class="col-12 col-md-8">
                    
                <!--first form row-->
                <div class="row">
                    <div class="col-12 col-md-6">
                        <label for="firstName_id" class="form-label">First Name</label>
                        <input type="text" class="form-control" id="firstName_id" name="firstName" aria-label="First Name" placeholder="First Name">
                    </div>
                    <div class="col-12 col-md-6">
                        <label for="lastName_id" class="form-label">Last Name</label>
                        <input type="text" class="form-control" id="lastName_id" name="lastName" aria-label="Last Name" placeholder="Last Name">
                    </div>
                </div>
                <!--second form row-->                       
                <div  iv class="row pt-2">
                    <div class="col-12 col-md-6">
                        <label for="email_id" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email_id" name="email" aria-label="Email" placeholder="Email">
                    </div>
                    <div class="col-12 col-md-6">
                        <label for="phone_id" class="form-label">Phone</label>
                        <input type="tel" class="form-control" id="phone_id" name="phone" aria-label="Phone" placeholder="Phone">
                    </div>
                </div>
                <!--third form row-->
                <div class="row pt-2">
                    <div class="col">
                        <label for="address_id" class="form-label">Address</label>
                        <input type="text" class="form-control" id="address_id" name="address" aria-label="Address" placeholder="Address">
                    </div>
                </div>
                <!--fourth form row-->
                <div class="row pt-2">
                    <div class="col">
                        <label for="address2_id" class="form-label">Address (line 2)</label>
                        <input type="text" class="form-control" id="address2_id" name="address2" aria-label="Address Line 2" placeholder="Apartment, studio, or floor">
                    </div>
                </div>
                <!--fifth form row-->
                <div class="row pt-2">
                    <div class="col-12 col-sm-4 col-md-6">
                        <label for="city_id" class="form-label">City</label>
                        <input type="text" class="form-control" id="city_id" name="city" aria-label="City" placeholder="City">
                    </div>
                    <div class="col-12 col-sm-4">
                        <label class="form-label">State</label>
                        <select title="inputState" id="inputState" class="form-select">
                                    <option selected>Choose...</option>
                                    <option value="AL">Alabama</option>
                                    <option value="AK">Alaska</option>
                                    <option value="AZ">Arizona</option>
                                    <option value="AR">Arkansas</option>
                                    <option value="CA">California</option>
                                    <option value="CO">Colorado</option>
                                    <option value="CT">Connecticut</option>
                                    <option value="DE">Delaware</option>
                                    <option value="DC">District Of Columbia</option>
                                    <option value="FL">Florida</option>
                                    <option value="GA">Georgia</option>
                                    <option value="HI">Hawaii</option>
                                    <option value="ID">Idaho</option>
                                    <option value="IL">Illinois</option>
                                    <option value="IN">Indiana</option>
                                    <option value="IA">Iowa</option>
                                    <option value="KS">Kansas</option>
                                    <option value="KY">Kentucky</option>
                                    <option value="LA">Louisiana</option>
                                    <option value="ME">Maine</option>
                                    <option value="MD">Maryland</option>
                                    <option value="MA">Massachusetts</option>
                                    <option value="MI">Michigan</option>
                                    <option value="MN">Minnesota</option>
                                    <option value="MS">Mississippi</option>
                                    <option value="MO">Missouri</option>
                                    <option value="MT">Montana</option>
                                    <option value="NE">Nebraska</option>
                                    <option value="NV">Nevada</option>
                                    <option value="NH">New Hampshire</option>
                                    <option value="NJ">New Jersey</option>
                                    <option value="NM">New Mexico</option>
                                    <option value="NY">New York</option>
                                    <option value="NC">North Carolina</option>
                                    <option value="ND">North Dakota</option>
                                    <option value="OH">Ohio</option>
                                    <option value="OK">Oklahoma</option>
                                    <option value="OR">Oregon</option>
                                    <option value="PA">Pennsylvania</option>
                                    <option value="RI">Rhode Island</option>
                                    <option value="SC">South Carolina</option>
                                    <option value="SD">South Dakota</option>
                                    <option value="TN">Tennessee</option>
                                    <option value="TX">Texas</option>
                                    <option value="UT">Utah</option>
                                    <option value="VT">Vermont</option>
                                    <option value="VA">Virginia</option>
                                    <option value="WA">Washington</option>
                                    <option value="WV">West Virginia</option>
                                    <option value="WY">Wyoming</option>
                        </select>
                    </div>
                    <div class="col-12 col-sm-4 col-md-2">
                        <label for="zip_id" class="form-label">Zip</label>
                        <input type="text" class="form-control" id="zip_id" name="zip" aria-label="Zip" placeholder="Zip">
                    </div>
                </div> 
                <!--button row-->
                <div class="row pt-3">
                    <div class="col-12 col-md-6">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="" id="familyCheckBox">
                            <label class="form-check-label" for="familyCheckBox">Family</label>
                        </div>
                    </div>
                    <div class="col-12 col-md-6">
                        <button type="button" class="btn btn-primary float-end">Save</button>
                    </div>
                </div>
            </div>
        </form>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
</body>

</html>
